# =============================================================================
#  tmux Configuration for Remote Development
#  Optimized for: Tailscale SSH + Claude Code workflows
# =============================================================================


# ---------------------------------------------------------------------------
#  Prefix Key
# ---------------------------------------------------------------------------
# Remap prefix from Ctrl-b to Ctrl-a (closer to home row, easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix


# ---------------------------------------------------------------------------
#  General Settings
# ---------------------------------------------------------------------------
# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Eliminate ESC delay (critical for Vim/Neovim users)
set -sg escape-time 0

# Increase scrollback buffer (default 2000 is too small for dev work)
set -g history-limit 50000

# Enable focus events (useful for Vim autoread, etc.)
set -g focus-events on

# Increase display time for status messages
set -g display-time 3000

# Increase display time for pane indicators
set -g display-panes-time 2000

# Use vi key bindings in command prompt
set -g status-keys vi


# ---------------------------------------------------------------------------
#  Colors & Terminal
# ---------------------------------------------------------------------------
# 256 color support
set -g default-terminal "tmux-256color"

# True color (24-bit) support — essential for modern themes
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",alacritty:Tc"

# Undercurl support (for spell checking highlights in Neovim, etc.)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'


# ---------------------------------------------------------------------------
#  Numbering
# ---------------------------------------------------------------------------
# Start window and pane numbering at 1 (0 is too far from the other keys)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially when one is closed
set -g renumber-windows on


# ---------------------------------------------------------------------------
#  Window & Pane Splits
# ---------------------------------------------------------------------------
# Intuitive split bindings that preserve the current working directory
# | for vertical split (left/right), - for horizontal split (top/bottom)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Also support \ (unshifted |) for convenience
bind \\ split-window -h -c "#{pane_current_path}"

# New windows also preserve the current path
bind c new-window -c "#{pane_current_path}"

# Remove default split bindings
unbind '"'
unbind %


# ---------------------------------------------------------------------------
#  Pane Navigation (Alt + Arrow — no prefix needed)
# ---------------------------------------------------------------------------
# Move between panes without pressing prefix first — fast context switching
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D


# ---------------------------------------------------------------------------
#  Pane Resizing (Prefix + Ctrl+Arrow)
# ---------------------------------------------------------------------------
# Resize panes in increments of 5 cells
bind -r C-Left  resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up    resize-pane -U 5
bind -r C-Down  resize-pane -D 5

# Fine-grained resize with prefix + Shift+Arrow (1 cell at a time)
bind -r S-Left  resize-pane -L 1
bind -r S-Right resize-pane -R 1
bind -r S-Up    resize-pane -U 1
bind -r S-Down  resize-pane -D 1


# ---------------------------------------------------------------------------
#  Mouse Support
# ---------------------------------------------------------------------------
# Full mouse support: click panes, resize panes, scroll, select text
set -g mouse on


# ---------------------------------------------------------------------------
#  Copy Mode (Vi-style)
# ---------------------------------------------------------------------------
# Use vi keybindings in copy mode
setw -g mode-keys vi

# Enter copy mode with prefix + v (in addition to default prefix + [)
bind v copy-mode

# Vi-style selection and yank
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# Double-click to select word, triple-click to select line
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line


# ---------------------------------------------------------------------------
#  Status Bar (Catppuccin Mocha-inspired)
# ---------------------------------------------------------------------------
#  Palette:
#    Base      #1e1e2e   (dark background)
#    Surface0  #313244   (slightly lighter)
#    Overlay0  #6c7086   (muted text)
#    Text      #cdd6f4   (primary text)
#    Blue      #89b4fa   (accent)
#    Green     #a6e3a1   (success/active)
#    Peach     #fab387   (highlight)
#    Mauve     #cba6f7   (special)

# Status bar position and refresh
set -g status-position bottom
set -g status-interval 5

# Status bar colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left side: session name
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#89b4fa] "

# Right side: host, date, time
set -g status-right-length 80
set -g status-right "#[fg=#6c7086]#[fg=#cdd6f4,bg=#313244]  #H #[fg=#89b4fa,bg=#313244]#[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M "

# Window status formatting
set -g status-justify left

# Inactive windows
setw -g window-status-format "#[fg=#6c7086,bg=#1e1e2e] #I:#W "

# Active window
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#313244]#[fg=#a6e3a1,bg=#313244,bold] #I:#W #[fg=#313244,bg=#1e1e2e]"

# Separator between windows
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message/command styling
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Clock mode
setw -g clock-mode-colour "#89b4fa"

# Mode (copy mode, etc.) styling
setw -g mode-style "bg=#313244,fg=#cdd6f4"


# ---------------------------------------------------------------------------
#  TPM (Tmux Plugin Manager)
# ---------------------------------------------------------------------------
# Install TPM if not already present:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# Install plugins:  prefix + I
# Update plugins:   prefix + U
# Remove plugins:   prefix + alt + u

# Plugin list
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'     # Sensible defaults
set -g @plugin 'tmux-plugins/tmux-yank'         # System clipboard integration
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Save/restore sessions across restarts
set -g @plugin 'tmux-plugins/tmux-continuum'    # Auto-save and auto-restore sessions

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'    # Restore pane contents
set -g @resurrect-strategy-nvim 'session'       # Restore Neovim sessions

# tmux-continuum settings
set -g @continuum-restore 'on'                  # Auto-restore last saved session
set -g @continuum-save-interval '15'            # Save every 15 minutes

# Initialize TPM (keep this at the very bottom of the config)
run '~/.tmux/plugins/tpm/tpm'
